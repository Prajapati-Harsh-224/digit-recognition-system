services:
  - type: web
    name: digit-recognition-system
    env: python

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: gunicorn DigitRecognizer.wsgi

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0